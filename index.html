     *   (c) Instructs Gemini to return ONLY valid JSON in the exact
     *       shape:  { schemes: [{ name, status, reason, missingItems }] }
     *
     * Called by the (not-yet-wired) Gemini API function before each request.
     * Does not call the API itself — pure string assembly.
     */
    function buildGeminiPrompt() {

      // ── (a) User profile in readable prose ───────────────────────

      // Map each answered question to "Question label: Human-readable answer"
      //
      // Uses q.text (English) intentionally, not qText(q) — this whole
      // function builds the PROMPT sent to Gemini, not UI shown to the
      // user, so it stays English throughout for the same reason
      // labelFor() does (see that function's comment above).
      const profileLines = QUESTIONS
        .filter(q => state.answers[q.id] != null)
        .map(q => {
          const label = q.text.replace(/\?$/, "");          // strip trailing "?"
          const value = labelFor(q.id, state.answers[q.id]);
          const unit  = (q.type === "number" && q.unit) ? ` ${q.unit}` : "";
          return `- ${label}: ${value}${unit}`;
        });

      const documentsUploaded = Object.keys(state.documents);
      const docLine = documentsUploaded.length > 0
        ? `- Documents uploaded: ${documentsUploaded.join(", ")}`
        : "- Documents uploaded: none";

      const userProfile = [...profileLines, docLine].join("\n");

      // ── (b) Scheme catalogue as structured reference text ─────────

      const catalogueText = SCHEME_CATALOGUE.map((s, i) =>
        `${i + 1}. ${s.name} [${s.ministry}]\n` +
        `   Benefit: ${s.benefit}\n` +
        `   Eligibility: ${s.eligibility}`
      ).join("\n\n");

      // ── (c) Language instruction ──────────────────────────────────
      //
      // NOTE: this is computed here but NOT appended to the returned
      // string below. callGemini() appends it itself, AFTER the
      // documentChecks JSON-shape contract it adds on top of this base
      // prompt — so the language instruction is always the last thing
      // Gemini reads, covering every field (reason, missingItems, AND
      // documentChecks.note) in one place rather than being buried
      // before the documentChecks shape is even introduced.
      //
      // Exposed as a property on the returned string isn't possible in
      // JS, so buildGeminiPrompt() exports it via a second return path:
      // callers needing it call buildLanguageInstruction() directly
      // (defined just below, shared so this logic isn't duplicated).

      // ── (d) Full prompt with output contract ─────────────────────

      return `You are an expert on Indian government welfare schemes.
A citizen has completed an eligibility self-assessment. Their details are below.
Evaluate their eligibility for each scheme in the reference list and return a
structured JSON result.

═══════════════════════════════════════
CITIZEN PROFILE
═══════════════════════════════════════
${userProfile}

═══════════════════════════════════════
SCHEME REFERENCE LIST
═══════════════════════════════════════
${catalogueText}

═══════════════════════════════════════
TASK
═══════════════════════════════════════
For EVERY scheme in the reference list, return a JSON object with this exact shape:

{
  "schemes": [
    {
      "name": "<exact scheme name from the list>",
      "status": "green" | "yellow" | "red",
      "reason": "<one or two plain-English sentences explaining why>",
      "missingItems": ["<short phrase>", ...]
    }
  ]
}

Status definitions:
  "green"  — citizen very likely qualifies based on the information provided
  "yellow" — citizen may qualify but one or more criteria cannot be confirmed
              from the answers given (list those criteria in missingItems)
  "red"    — citizen does not meet the eligibility criteria

reason field rules:
  - Always name the SPECIFIC criterion that drove the status — not a generic
    statement. Reference the actual threshold/limit from the scheme's
    eligibility text AND the citizen's actual stated answer.
  - For "red" status especially, the reason must clearly explain WHY, not
    just THAT the citizen is ineligible. Quote the limit and the citizen's
    value so they understand the gap.
      Good:  "Income exceeds the ₹2,50,000 limit for this scheme — you
              stated ₹5,00,001–₹8,00,000."
      Good:  "This scheme requires age 60 or above — you stated your age
              as 34."
      Bad:   "You are not eligible for this scheme."
      Bad:   "Citizen does not meet the criteria."
  - Keep it to one or two sentences. Plain English a non-specialist can
    read in one pass — no legal or bureaucratic phrasing.

missingItems rules:
  - Each entry is a short noun phrase naming a document or criterion that
    is required but not confirmed, e.g. "BPL card", "age below 40",
    "Caste certificate (SC/ST/OBC)", "Disability certificate ≥40%".
  - Use an empty array [] when status is "green" or "red".
  - Never include explanatory prose in missingItems — short phrases only.

Critical output rules:
  - Output NOTHING except the JSON object — no markdown fences, no commentary,
    no preamble, no trailing text.
  - The JSON must be valid and parseable with JSON.parse() without any pre-processing.
  - Include all ${SCHEME_CATALOGUE.length} schemes in the array, in the same order
    as the reference list.
  - Do not invent schemes not in the reference list.`;
    }

    /**
     * buildLanguageInstruction() → string
     *
     * Returns the Hindi-response instruction block when state.language
     * is 'hi', or an empty string for English. Shared by callGemini(),
     * which appends this once at the very end of the FULL assembled
     * prompt (base + document-verification section + documentChecks
     * JSON contract) — so it's always the last instruction Gemini reads,
     * applying uniformly to every user-facing text field in the response
     * regardless of which section introduced that field.
     *
     * "name" and "status" are explicitly excluded from translation:
     * they're consumed programmatically downstream (SCHEME_CATALOGUE.find,
     * CATALOGUE_META lookups, the green/yellow/red status branching), so
     * translating them would silently break every benefit/ministry/portal
     * lookup and the colour-coded section grouping on the results screen.
     */
    function buildLanguageInstruction() {
      if (state.language !== "hi") return "";
      return `

═══════════════════════════════════════
LANGUAGE
═══════════════════════════════════════
Respond with the "name" and "status" fields exactly as specified in English
(official scheme names and the literal values "green"/"yellow"/"red") — these
are used programmatically by the application and must NOT be translated.

However, write the following fields IN HINDI (Devanagari script), in plain,
simple Hindi a non-specialist citizen can read easily — avoid heavy
Sanskritised bureaucratic vocabulary where a simpler everyday Hindi word
exists:
  - The "reason" field for every scheme
  - Every string inside each scheme's "missingItems" array
  - The "note" field inside every documentChecks entry (if present)

Do not translate "docId" or "label" inside documentChecks — docId is a
programmatic identifier and label should match the document name format
already used elsewhere in this prompt.`;
    }


    // ── Gemini API caller ─────────────────────────────────────────

    /**
     * normaliseMime(file) → string
     *
     * Returns a reliable MIME type string for a File object.
     * File.type can be empty on some mobile browsers even for valid files,
     * so we fall back to extension sniffing when it is blank.
     * Gemini accepts: image/jpeg, image/png, image/webp, image/heic,
     * image/heif, image/gif, application/pdf.
     */
    function normaliseMime(file) {
      if (file.type) return file.type;
      const ext = file.name.split(".").pop().toLowerCase();
      const map = {
        pdf:  "application/pdf",
        jpg:  "image/jpeg", jpeg: "image/jpeg",
        png:  "image/png",
        webp: "image/webp",
        heic: "image/heic", heif: "image/heif",
        gif:  "image/gif",
      };
      return map[ext] || "application/octet-stream";
    }

    /**
     * callGemini() → Promise<{ schemes, documentChecks }>
     *
     * Full pipeline:
     *   1. Convert every document in state.documents to base64.
     *   2. Build a multimodal Gemini request:
     *        parts = [ text(prompt), text(doc-label), inline_data(doc), … ]
     *   3. POST to the Gemini generateContent endpoint.
     *   4. Parse the JSON response and return { schemes, documentChecks }.
     *
     * Throws a plain Error with a human-readable .message on any failure
     * (network, HTTP error, bad JSON) so the caller can display it directly.
     *
     * Return shape:
     *   schemes:        Array<{ name, status, reason, missingItems }>
     *   documentChecks: Array<{ docId, label, legible, authentic, note }>
     */
    async function callGemini() {

      // ── 1. Convert documents to base64 in parallel ───────────────

      const docEntries = Object.entries(state.documents);   // [[id, File], …]

      const docParts = await Promise.all(
        docEntries.map(async ([docId, file]) => {
          const docMeta = DOCS.find(d => d.id === docId);
          const label   = docMeta ? docMeta.label : docId;
          const mime    = normaliseMime(file);
          const base64  = await fileToBase64(file);
          return { docId, label, mime, base64 };
        })
      );

      // ── 2. Build the complete prompt text ────────────────────────
      //
      // The prompt has two sections:
      //   A) Document verification — Gemini looks at each image/PDF and
      //      reports on legibility, document type match, and any red flags.
      //   B) Scheme eligibility — from buildGeminiPrompt(), which knows
      //      nothing about documents (pure text reasoning).
      //
      // Both sections share a single JSON output object so we only need
      // one API call.

      const docVerifySection = docParts.length > 0
        ? `═══════════════════════════════════════
DOCUMENT VERIFICATION
═══════════════════════════════════════
The citizen has uploaded ${docParts.length} document(s). Each document is
attached as an image or PDF immediately following its label below.

For each document, assess:
  1. Legibility   — Is the document clear enough to read? (not blurry, not
                    truncated, text is visible)
  2. Authenticity cues — Does the document visually match what it claims to be?
                    (correct government format, expected fields present, issuing
                    authority visible, no obvious tampering)
  3. Mismatch flag — Does anything look inconsistent with the citizen profile
                    above? (e.g. Aadhaar showing a very different age than stated,
                    income certificate issued for a different state)

Documents to review:
${docParts.map(d => `  - ${d.label} (${d.docId})`).join("\n")}

Return your findings in a "documentChecks" array added to the JSON output
(see output format below).`
        : "";

      // Inject the doc-verify section into the base prompt, just before TASK
      const basePrompt  = buildGeminiPrompt();
      const fullPrompt  = docParts.length > 0
        ? basePrompt.replace(
            "═══════════════════════════════════════\nTASK",
            docVerifySection +
            "\n\n═══════════════════════════════════════\nTASK"
          )
        : basePrompt;

      // Extend the JSON shape contract to include documentChecks
      const extendedPrompt = fullPrompt + (docParts.length > 0
        ? `

Also include this key at the top level of the JSON object:

  "documentChecks": [
    {
      "docId":     "<id string, e.g. \\"aadhaar\\">",
      "label":     "<human-readable name, e.g. \\"Aadhaar Card\\">",
      "legible":   true | false,
      "authentic": true | false,
      "note":      "<one short sentence — leave empty string if all looks fine>"
    }
  ]

documentChecks rules:
  - One entry per uploaded document, in the same order as the DOCUMENT
    VERIFICATION list above.
  - Set legible: false if text is unreadable, image is severely blurred,
    or the file appears to be a placeholder / blank page.
  - Set authentic: false if the document does not match its claimed type,
    shows clear signs of editing, or is missing expected government markings.
  - If legible is false, set authentic: false as well (cannot assess).
  - Keep note to one sentence. Use an empty string "" if both flags are true
    and there is nothing noteworthy.`
        : "")
        // Language instruction is appended LAST, after every JSON field
        // (including documentChecks.note) has already been introduced to
        // the model, so it applies as a final, comprehensive directive
        // covering the whole response rather than a forward reference to
        // fields not yet defined.
        + buildLanguageInstruction();

      // ── 3. Assemble the Gemini request body ──────────────────────
      //
      // parts array layout:
      //   [ { text: fullPrompt },
      //     { text: "Document 1: Aadhaar Card" },
      //     { inline_data: { mime_type, data } },
      //     { text: "Document 2: Income Certificate" },
      //     { inline_data: { mime_type, data } },
      //     … ]
      //
      // Interleaving a text label before each inline_data part is important:
      // it tells Gemini which document slot each image corresponds to, so
      // its verification reasoning can reference documents by name.

      const parts = [{ text: extendedPrompt }];

      docParts.forEach((d, i) => {
        parts.push({
          text: `Document ${i + 1}: ${d.label} (id: ${d.docId})`
        });
        parts.push({
          inline_data: {
            mime_type: d.mime,
            data:      d.base64,
          }
        });
      });

      const requestBody = {
        contents: [{ parts }],
        generationConfig: {
          // Temperature 0 → deterministic, structured output
          temperature:     0,
          // Gemini 2.5 Flash has "thinking" enabled by default, and thinking
          // tokens are deducted from the SAME maxOutputTokens budget before
          // any visible text is produced. For a 15-scheme JSON array this
          // was silently eating most of a 4096 budget, truncating the
          // response mid-array (the classic "Expected ',' or ']'" parse error).
          //
          // This task is pure structured classification — no extended
          // reasoning needed — so thinking is turned off entirely and the
          // full budget goes to the actual JSON output.
          thinkingConfig: {
            thinkingBudget: 0,
          },
          // Generous headroom: 15 scheme objects (name, status, 1-2 sentence
          // reason, missingItems array) + documentChecks, comfortably under
          // the model's ~65K output ceiling.
          maxOutputTokens: 8192,
        },
      };

      // ── 4. POST to Gemini generateContent endpoint ───────────────

      const endpoint =
        `https://generativelanguage.googleapis.com/v1beta/models/` +
        `${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;

      let httpResponse;
      try {
        httpResponse = await fetch(endpoint, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(requestBody),
        });
      } catch (networkErr) {
        throw new Error(
          `Network error — could not reach Gemini API. ` +
          `Check your internet connection. (${networkErr.message})`
        );
      }

      // ── 5. Handle HTTP-level errors ───────────────────────────────

      if (!httpResponse.ok) {
        let detail = `HTTP ${httpResponse.status}`;
        try {
          const errBody = await httpResponse.json();
          // Gemini error bodies: { error: { message, status, code } }
          if (errBody?.error?.message) detail += ` — ${errBody.error.message}`;
        } catch (_) { /* response wasn't JSON */ }

        if (httpResponse.status === 400) throw new Error(`Bad request: ${detail}. Check that all uploaded files are valid images or PDFs.`);
        if (httpResponse.status === 401) throw new Error(`Invalid API key. Replace YOUR_API_KEY_HERE in the script with a real Gemini key from aistudio.google.com.`);
        if (httpResponse.status === 429) throw new Error(`Rate limit reached. Wait a moment and try again. (${detail})`);
        throw new Error(`Gemini API error: ${detail}`);
      }

      // ── 6. Parse the response ─────────────────────────────────────

      const responseJson = await httpResponse.json();

      // Gemini response shape:
      // { candidates: [{ content: { parts: [{ text: "…" }] } }] }
      const rawText = responseJson
        ?.candidates?.[0]
        ?.content
        ?.parts
        ?.map(p => p.text || "")
        .join("") ?? "";

      const finishReason = responseJson?.candidates?.[0]?.finishReason;

      // MAX_TOKENS can return PARTIAL text (not empty) — the old check below
      // only fired on a fully empty response, so a truncated mid-array JSON
      // payload would silently fall through to JSON.parse() and fail with a
      // confusing "Expected ',' or ']'" syntax error instead of a clear
      // "response was cut off" message. Check this before the empty-text guard.
      if (finishReason === "MAX_TOKENS") {
        console.error("[callGemini] truncated raw response text:", rawText);
        throw new Error(
          "Gemini's response was cut off before finishing (hit the output " +
          "token limit). This is usually temporary — try again, or remove " +
          "an uploaded document to shorten the request."
        );
      }

      if (!rawText) {
        // Check for safety blocks or other non-completion reasons
        if (finishReason && finishReason !== "STOP") {
          throw new Error(`Gemini stopped early: ${finishReason}. Try removing or replacing an uploaded document.`);
        }
        throw new Error("Gemini returned an empty response. Please try again.");
      }

      // ── 7. Extract and parse the JSON ─────────────────────────────
      //
      // Despite instructions, Gemini occasionally wraps output in ```json … ```.
      // We strip fences as a first-line defence before calling JSON.parse().

      let cleanText = rawText.trim();

      // Strip markdown code fences if present
      const fenceMatch = cleanText.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/);
      if (fenceMatch) cleanText = fenceMatch[1].trim();

      // If there's still a leading/trailing non-JSON character, find the
      // outermost { … } and extract it
      if (!cleanText.startsWith("{")) {
        const start = cleanText.indexOf("{");
        const end   = cleanText.lastIndexOf("}");
        if (start !== -1 && end > start) cleanText = cleanText.slice(start, end + 1);
      }

      let parsed;
      try {
        parsed = JSON.parse(cleanText);
      } catch (parseErr) {
        console.error("[callGemini] raw response text:", rawText);
        throw new Error(
          `Gemini returned text that isn't valid JSON. ` +
          `Raw response logged to console. (${parseErr.message})`
        );
      }

      // ── 8. Validate the parsed shape ──────────────────────────────

      if (!Array.isArray(parsed?.schemes)) {
        console.error("[callGemini] raw response text:", rawText);
        throw new Error(
          'Gemini response is missing the "schemes" array. ' +
          "Raw response logged to console."
        );
      }

      const VALID_STATUSES = new Set(["green", "yellow", "red"]);
      parsed.schemes.forEach((s, i) => {
        if (typeof s.name   !== "string") throw new Error(`schemes[${i}].name is not a string`);
        if (!VALID_STATUSES.has(s.status))
          throw new Error(`schemes[${i}].status "${s.status}" is not green/yellow/red`);
        if (typeof s.reason !== "string") throw new Error(`schemes[${i}].reason is not a string`);
        if (!Array.isArray(s.missingItems))
          throw new Error(`schemes[${i}].missingItems is not an array`);
      });

      // documentChecks is optional (only present when documents were uploaded)
      const documentChecks = Array.isArray(parsed.documentChecks)
        ? parsed.documentChecks
        : [];

      return {
        schemes:        parsed.schemes,
        documentChecks,
      };
    }

    /**
     * t(key) → string

     * Looks up a UI string in the current locale (state.language).
     * Falls back to English if missing in the active locale, then to the
     * literal key name if even English is missing — so a typo'd or
     * not-yet-translated key is visibly broken in dev rather than
     * silently rendering an empty string.
     */
    function t(key) {
      const locale = TRANSLATIONS[state.language] || TRANSLATIONS.en;
      if (locale[key] != null) return locale[key];
      if (TRANSLATIONS.en[key] != null) return TRANSLATIONS.en[key];
      return key;
    }

    /**
     * setLanguage(lang)
     *
     * Switches state.language, persists it immediately, and re-renders
     * the current screen so the change is visible without a reload.
     */
    function setLanguage(lang) {
      if (lang !== "en" && lang !== "hi") return;
      if (state.language === lang) return;
      state.language = lang;
      render();
    }

    /**
     * Bilingual-field helpers for data arrays that carry their own
     * translations (QUESTIONS, DOCS) rather than going through the
     * TRANSLATIONS/t() lookup table. Each follows the same pattern:
     * return the _hi field when state.language === 'hi' AND that field
     * is present, else fall back to the English field. The fallback
     * means an entry missing a translation never renders blank.
     */
    function qText(q)  { return state.language === "hi" && q.text_hi  ? q.text_hi  : q.text; }
    function qHint(q)  { return state.language === "hi" && q.hint_hi  ? q.hint_hi  : (q.hint || ""); }
    function qUnit(q)  { return state.language === "hi" && q.unit_hi  ? q.unit_hi  : (q.unit || ""); }
    function optLabel(opt) { return state.language === "hi" && opt.label_hi ? opt.label_hi : opt.label; }
    function docLabel(doc) { return state.language === "hi" && doc.label_hi ? doc.label_hi : doc.label; }
    function docHint(doc)  { return state.language === "hi" && doc.hint_hi  ? doc.hint_hi  : doc.hint; }
    function schemeBenefit(entry)  { return state.language === "hi" && entry?.benefit_hi  ? entry.benefit_hi  : (entry?.benefit  || ""); }
    function schemeMinistry(entry) { return state.language === "hi" && entry?.ministry_hi ? entry.ministry_hi : (entry?.ministry || ""); }
    //
    // localStorage key + schema version. Bumping STORAGE_VERSION makes any
    // session saved under an older shape get discarded on boot rather than
    // crashing when a field it expects no longer exists.
    const STORAGE_KEY     = "schemeSetu:session";
    const STORAGE_VERSION = 1;

    /**
     * persistState()
     *
     * Writes the resumable slice of `state` to localStorage. Called from
     * inside render() so every screen transition and answer/document change
     * is captured automatically — no need to remember to call this manually
     * at each mutation site.
     *
     * Deliberately excludes:
     *   - state.documents  (real File objects — not serialisable, and even
     *                        if they were, re-hydrating file *contents* from
     *                        localStorage isn't something browsers allow)
     *   - state.previews   (blob: URLs are revoked/invalid after a reload)
     *   - state.apiError   (transient — a stale error shouldn't resurface)
     *
     * Wrapped in try/catch: localStorage can throw in private browsing mode
     * on some browsers, or if the quota is exceeded. A save failure should
     * never break the app — it just means this session won't be resumable.
     */
    function persistState() {
      try {
        const snapshot = {
          version:       STORAGE_VERSION,
          savedAt:       Date.now(),
          language:      state.language,
          currentScreen: state.currentScreen,
          questionIndex: state.questionIndex,
          documentMeta:  state.documentMeta,
          answers:       state.answers,
          results:       state.results,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
      } catch (err) {
        console.warn("[persistState] could not save session:", err.message);
      }
    }

    /**
     * loadPersistedState() → object | null
     *
     * Reads and validates the saved session. Returns null (not a thrown
     * error) for any of: nothing saved, corrupted JSON, or a version
     * mismatch — all of these should be treated identically by the caller
     * as "no resumable session."
     */
    function loadPersistedState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;

        const snapshot = JSON.parse(raw);
        if (snapshot?.version !== STORAGE_VERSION) return null;

        return snapshot;
      } catch (err) {
        console.warn("[loadPersistedState] could not read session:", err.message);
        return null;
      }
    }

    /**
     * clearPersistedState()
     *
     * Removes the saved session. Called on Start Over and when the user
     * declines to resume, so a stale session never reappears unexpectedly.
     */
    function clearPersistedState() {
      try { localStorage.removeItem(STORAGE_KEY); }
      catch (err) { console.warn("[clearPersistedState] could not clear session:", err.message); }
    }

    /**
     * hasResumableContent(snapshot) → boolean
     *
     * A freshly-loaded session sitting on the landing screen with nothing
     * filled in isn't worth offering to "resume" — that would just be
     * an empty prompt for no reason. Only offer resume if the user has
     * actually made progress.
     */
    function hasResumableContent(snapshot) {
      if (!snapshot) return false;
      if (snapshot.currentScreen && snapshot.currentScreen !== "landing") return true;
      if (snapshot.answers && Object.keys(snapshot.answers).length > 0) return true;
      if (snapshot.documentMeta && Object.keys(snapshot.documentMeta).length > 0) return true;
      if (snapshot.results) return true;
      return false;
    }

    // Ordered list used by navigateNext() to advance screens
    const SCREENS = ["landing", "upload", "questions", "results"];


    // ── Router ────────────────────────────────────────────────────

    /*
     * navigate(screen) — jump to any named screen
     * navigateNext()   — advance one step in SCREENS order
     */
    function navigate(screen) {
      // When entering questions from upload (forward), always start at Q1.
      // When going back from results, questionIndex is preserved so the user
      // lands back on the last question they saw.
      if (screen === "questions" && state.currentScreen === "upload") {
        state.questionIndex = 0;
      }
      state.currentScreen = screen;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function navigateNext() {
      const idx = SCREENS.indexOf(state.currentScreen);
      const next = SCREENS[idx + 1];
      if (next) navigate(next);
    }

    /*
     * render() — single entry point.
     * Clears #app and delegates to the correct screen function.
     * Also persists the resumable slice of state on every call, so any
     * answer, document upload, or screen change is saved automatically
     * without needing a separate save call at each mutation site.
     */
    function render() {
      app.innerHTML = "";   // clear before each paint
      persistState();

      switch (state.currentScreen) {
        case "landing":   renderLanding();   break;
        case "upload":    renderUpload();    break;
        case "questions": renderQuestions(); break;
        case "results":   renderResults();   break;
        default:
          app.innerHTML = `<p style="color:var(--color-danger)">Unknown screen: ${esc(state.currentScreen)}</p>`;
      }

      // wiring after every render() call, not per-screen-function.
      wireLanguageToggle();
