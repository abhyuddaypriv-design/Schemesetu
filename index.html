                           type="button"
                           aria-label="${esc(t("upload_remove"))} — ${esc(label)}">
                     <svg width="11" height="11" viewBox="0 0 12 12" fill="none"
                          stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" aria-hidden="true">
                       <line x1="1" y1="1" x2="11" y2="11"/>
                       <line x1="11" y1="1" x2="1" y2="11"/>
                     </svg>
                     ${esc(t("upload_remove"))}
                   </button>
                 </div>`
              : ""}

            <!-- Invisible file input.
                 Empty card: covers the whole card so clicking anywhere triggers it.
                 Uploaded card: hidden; "Change" button triggers it programmatically. -->
            <input class="doc-file-input"
                   type="file"
                   id="file-${doc.id}"
                   data-doc="${doc.id}"
                   accept="image/*,.pdf"
                   aria-label="${esc(label)}"
                   ${file ? 'style="display:none"' : ""}>

          </div>`;
      }

      // ── Render DOM ────────────────────────────────────────────
      app.innerHTML = `
        ${masthead()}

        <div class="upload-intro">
          <h1>${esc(t("upload_h1"))}</h1>
          <p>${esc(t("upload_sub"))}</p>
        </div>

        <div class="upload-progress" role="group" aria-label="${esc(t("upload_h1"))}">
          <div class="upload-progress-bar" aria-hidden="true">
            <div class="upload-progress-fill" style="width:${fillPct}%"></div>
          </div>
          <span class="upload-progress-label" aria-live="polite">
            ${uploadedCount} / ${DOCS.length}
          </span>
        </div>

        <div class="doc-grid" id="doc-grid">
          ${DOCS.map(docCardHTML).join("")}
        </div>

        <div class="upload-actions">
          <button class="btn ghost" id="btn-back">${esc(t("upload_back"))}</button>
          <button class="btn" id="btn-continue"
                  ${v.ok ? "" : "disabled"}
                  aria-describedby="upload-validation">
            ${esc(t("upload_continue"))}
          </button>
        </div>

        <div class="upload-validation" id="upload-validation" aria-live="polite">
          <p class="upload-count">
            <mark>${uploadedCount}</mark> ${esc(t("upload_count_of"))} ${DOCS.length} ${esc(t("upload_count_docs"))}
          </p>
          ${!v.ok ? `
            <ul class="upload-requirements">
              ${reqItemHTML(aadhaarMet,     t("upload_req_aadhaar"))}
              ${reqItemHTML(incomeProofMet, incomeProofLabels)}
            </ul>` : ""}
        </div>
      `;

      // ── Event wiring ──────────────────────────────────────────

      document.getElementById("btn-back")
        .addEventListener("click", () => navigate("landing"));

      document.getElementById("btn-continue")
        .addEventListener("click", () => { if (v.ok) navigateNext(); });

      // File inputs: store File in state.documents, generate preview URL, re-render
      document.querySelectorAll(".doc-file-input").forEach(input => {
        input.addEventListener("change", e => {
          const file = e.target.files[0];
          if (!file) return;
          const docId = e.target.dataset.doc;

          // Revoke any existing blob URL for this slot before replacing it
          if (state.previews[docId]) {
            URL.revokeObjectURL(state.previews[docId]);
            state.previews[docId] = null;
          }

          // Store the File object
          state.documents[docId] = file;

          // Mirror lightweight, serialisable metadata for localStorage —
          // the File itself can't be persisted, but the filename and
          // upload status can, so a resumed session can show "X uploaded"
          // even though the user will need to re-attach the actual file.
          state.documentMeta[docId] = {
            name: file.name,
            type: file.type,
            size: file.size,
          };

          // Generate a blob URL only for images; PDFs don't need one
          if (file.type.startsWith("image/")) {
            state.previews[docId] = URL.createObjectURL(file);
          }

          render();
        });
      });

      // "Change" buttons: unhide the file input and trigger it
      document.querySelectorAll(".doc-btn-change").forEach(btn => {
        btn.addEventListener("click", () => {
          const input = document.getElementById(`file-${btn.dataset.doc}`);
          input.style.display = "";
          input.click();
        });
      });

      // "Remove" buttons: revoke blob URL, delete from state, re-render
      document.querySelectorAll(".doc-btn-remove").forEach(btn => {
        btn.addEventListener("click", () => {
          const docId = btn.dataset.doc;
          if (state.previews[docId]) {
            URL.revokeObjectURL(state.previews[docId]);
            state.previews[docId] = null;
          }
          delete state.documents[docId];
          delete state.documentMeta[docId];
          render();
        });
      });
    }

    function renderQuestions() {
      const total = QUESTIONS.length;
      const idx   = state.questionIndex;
      const q     = QUESTIONS[idx];

      // Completed = number of questions already answered (not counting current)
      const pct = Math.round((idx / total) * 100);

      // Retrieve any previously saved answer for this question
      const saved = state.answers[q.id];

      // Direction flag: set by advanceQuestion / retreatQuestion before calling render()
      // Cleared right after we read it so it doesn't persist across future renders.
      const animDir = state._qDir || "forward";
      state._qDir = null;

      // ── Build the input control HTML ────────────────────────────

      function optionRows(inputType) {
        return q.options.map((opt, i) => {
          const inputId  = `qopt-${q.id}-${i}`;
          const isChecked = inputType === "radio"
            ? saved === opt.value
            : Array.isArray(saved) && saved.includes(opt.value);
          return `
            <div class="q-opt">
              <input type="${inputType}"
                     id="${inputId}"
                     name="q-${q.id}"
                     value="${esc(opt.value)}"
                     ${isChecked ? "checked" : ""}>
              <label class="q-opt-label" for="${inputId}">
                <span class="q-opt-indicator" aria-hidden="true">
                  <span class="q-opt-check"></span>
                </span>
                ${esc(optLabel(opt))}
              </label>
            </div>`;
        }).join("");
      }

      let controlHTML = "";
      switch (q.type) {
        case "single-select":
          controlHTML = `
            <fieldset class="q-options" id="q-control" aria-required="true">
              <legend class="sr-only">${esc(qText(q))}</legend>
              ${optionRows("radio")}
            </fieldset>`;
          break;

        case "multi-select":
          controlHTML = `
            <fieldset class="q-options" id="q-control" aria-required="true">
              <legend class="sr-only">${esc(qText(q))}</legend>
              ${optionRows("checkbox")}
            </fieldset>`;
          break;

        case "number":
          controlHTML = `
            <div class="q-number-row">
              <input type="number"
                     id="q-control"
                     min="${q.min}"
                     max="${q.max}"
                     inputmode="numeric"
                     placeholder="0"
                     value="${saved != null ? esc(String(saved)) : ""}"
                     aria-label="${esc(qText(q))}"
                     aria-required="true">
              ${q.unit ? `<span class="q-number-unit">${esc(qUnit(q))}</span>` : ""}
            </div>`;
          break;

        case "text":
          controlHTML = `
            <input type="text"
                   id="q-control"
                   class="q-text-input"
                   placeholder="${esc(t("q_placeholder_text"))}"
                   value="${saved != null ? esc(String(saved)) : ""}"
                   aria-label="${esc(qText(q))}"
                   aria-required="true">`;
          break;
      }

      // ── Render DOM ────────────────────────────────────────────

      const isFirst = idx === 0;
      const isLast  = idx === total - 1;

      app.innerHTML = `
        ${masthead()}

        <div class="qscreen">

          <!-- Progress -->
          <div class="q-progress-row" role="group" aria-label="${esc(t("q_question_label"))} ${idx + 1} ${esc(t("q_of"))} ${total}">
            <div class="q-progress-bar" aria-hidden="true">
              <div class="q-progress-fill" style="width:${pct}%"></div>
            </div>
            <span class="q-progress-label" aria-live="polite">
              ${esc(t("q_question_label"))} ${idx + 1} ${esc(t("q_of"))} ${total}
            </span>
          </div>

          <!-- Question card — wrapped in a clip container to prevent
               horizontal scrollbar during the slide-out/in transition -->
          <div class="q-viewport">
          <div class="q-card" id="q-card" data-dir="${animDir === "back" ? "back" : "forward"}">

            <div class="q-header">
              <h2 class="q-text">${esc(qText(q))}</h2>
              ${q.hint ? `<p class="q-hint">${esc(qHint(q))}</p>` : ""}
            </div>

            ${controlHTML}

            <div class="q-error" id="q-error" role="alert" aria-live="assertive"
                 style="display:none">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
                   stroke="var(--color-danger)" stroke-width="2"
                   stroke-linecap="round" aria-hidden="true">
                <circle cx="8" cy="8" r="7"/>
                <line x1="8" y1="5" x2="8" y2="8.5"/>
                <circle cx="8" cy="11.5" r=".5" fill="var(--color-danger)" stroke="none"/>
              </svg>
              <span id="q-error-msg"></span>
            </div>

            <div class="q-actions">
              <button class="btn ghost" id="btn-q-back">
                ${isFirst ? esc(t("q_back_to_docs")) : esc(t("q_back"))}
              </button>
              <button class="btn" id="btn-q-next">
                ${isLast ? esc(t("q_analyse")) : esc(t("q_next"))}
              </button>
            </div>

          </div><!-- /.q-card -->
          </div><!-- /.q-viewport -->

        </div><!-- /.qscreen -->
      `;

      // ── Helpers ────────────────────────────────────────────────

      function showError(msg) {
        const el  = document.getElementById("q-error");
        const txt = document.getElementById("q-error-msg");
        txt.textContent = msg;
        el.style.display = "flex";
        // Shake using a dedicated class so it never conflicts with enter/exit animations
        const card = document.getElementById("q-card");
        card.classList.remove("is-shaking");
        card.offsetWidth;                        // force reflow to restart animation
        card.classList.add("is-shaking");
        card.addEventListener("animationend", () => card.classList.remove("is-shaking"), { once: true });
      }

      function clearError() {
        document.getElementById("q-error").style.display = "none";
      }

      // ── Read current answer from DOM ───────────────────────────

      function readAnswer() {
        switch (q.type) {
          case "single-select": {
            const checked = document.querySelector(`input[name="q-${q.id}"]:checked`);
            return checked ? checked.value : null;
          }
          case "multi-select": {
            const checked = [...document.querySelectorAll(`input[name="q-${q.id}"]:checked`)];
            return checked.length > 0 ? checked.map(el => el.value) : null;
          }
          case "number": {
            const val = document.getElementById("q-control").value.trim();
            if (val === "") return null;
            const n = parseFloat(val);
            return isNaN(n) ? null : n;
          }
          case "text": {
            const val = document.getElementById("q-control").value.trim();
            return val.length > 0 ? val : null;
          }
        }
      }

      // ── Validation ─────────────────────────────────────────────

      function validate(answer) {
        if (answer === null) {
          const label = q.type === "multi-select" ? t("q_err_at_least_one") : t("q_err_an_answer");
          showError(`${t("q_err_choose")} ${label} ${t("q_err_to_continue")}`);
          return false;
        }
        if (q.type === "number") {
          if (answer < q.min || answer > q.max) {
            showError(`${t("q_err_number_range")} ${q.min} ${t("q_err_and")} ${q.max} ${qUnit(q) || ""}.`.trim());
            return false;
          }
        }
        clearError();
        return true;
      }

      // ── Two-phase transition ────────────────────────────────────
      //
      // transitionQuestion(dir, commitFn)
      //
      //   1. Adds .is-exiting-{dir} to the current card  → plays 200ms exit animation
      //   2. On animationend (or after EXIT_MS fallback)  → commitFn() mutates state
      //   3. render() repaints the new card               → plays 220ms enter animation
      //
      // Using animationend rather than setTimeout alone means the swap is
      // always locked to the actual animation frame, not a fixed delay guess.
      // The EXIT_MS fallback guards against browsers that fire no animationend
      // (e.g. when prefers-reduced-motion: reduce suppresses the animation).

      const EXIT_MS = 210;   // slightly over the 200ms exit duration

      function transitionQuestion(dir, commitFn) {
        const card     = document.getElementById("q-card");
        const exitClass = dir === "back" ? "is-exiting-back" : "is-exiting-forward";

        // Disable buttons immediately so double-clicks can't queue two transitions
        document.getElementById("btn-q-back").disabled = true;
        document.getElementById("btn-q-next").disabled = true;

        function doSwap() {
          commitFn();           // mutate state.questionIndex + state._qDir
          render();             // repaint — new card enters with CSS animation
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          // Skip the exit animation entirely for users who prefer no motion
          doSwap();
          return;
        }

        card.classList.add(exitClass);
        let swapped = false;

        card.addEventListener("animationend", function handler() {
          card.removeEventListener("animationend", handler);
          if (!swapped) { swapped = true; doSwap(); }
        });

        // Safety net: if animationend never fires (hidden tab, no GPU, etc.)
        setTimeout(() => { if (!swapped) { swapped = true; doSwap(); } }, EXIT_MS);
      }

      // ── Navigation ─────────────────────────────────────────────

      function goBack() {
        // Persist partial answer so it's pre-filled if they return
        const answer = readAnswer();
        if (answer !== null) state.answers[q.id] = answer;

        if (isFirst) {
          navigate("upload");
          return;
        }

        transitionQuestion("back", () => {
          state._qDir         = "back";
          state.questionIndex = idx - 1;
        });
      }

      function goNext() {
        const answer = readAnswer();
        if (!validate(answer)) return;

        state.answers[q.id] = answer;

        if (isLast) {
          // Last question: kick off the API call instead of a plain screen change.
          // renderProcessing() paints the loading UI immediately, then calls
          // callGemini() asynchronously and navigates to results when done.
          renderProcessing();
          return;
        }

        transitionQuestion("forward", () => {
          state._qDir         = "forward";
          state.questionIndex = idx + 1;
        });
      }

      // ── Event wiring ───────────────────────────────────────────

      document.getElementById("btn-q-back").addEventListener("click", goBack);
      document.getElementById("btn-q-next").addEventListener("click", goNext);

      // Clear error as soon as the user starts interacting with the control
      document.getElementById("q-control") &&
        document.getElementById("q-control").addEventListener("input", clearError);
      document.querySelectorAll(`input[name="q-${q.id}"]`).forEach(el =>
        el.addEventListener("change", clearError)
      );

      // Keyboard shortcut: Enter advances (except inside textareas)
      document.addEventListener("keydown", function onKey(e) {
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
          document.removeEventListener("keydown", onKey);
          goNext();
        }
      }, { once: true });

      // Auto-advance on single-select after a short delay (feels snappy)
      if (q.type === "single-select") {
        document.querySelectorAll(`input[name="q-${q.id}"]`).forEach(radio =>
          radio.addEventListener("change", () => {
            clearError();
            setTimeout(goNext, 180);   // brief pause so the selection is visible
          })
        );
      }
    }

    /**
     * renderError(msg, onRetry)
     *
     * Replaces #app with a self-contained error screen.
     * Used by any path that produces a fatal error the user must recover from:
     *   — renderProcessing().catch (API / parse failure)
     *   — renderResults() when state.results is null
     *
     * onRetry: function called when the user clicks "Try Again".
     *          Typically renderProcessing (re-runs the full API call) or
     *          a navigate() to a specific screen.
     */
    function renderError(msg, onRetry) {
      // Sanitise message length — very long internal error strings
      // shouldn't flood the UI, but we preserve enough to be useful.
      //
      // Note: displayMsg itself is NOT translated — it's typically a
      // dynamically generated diagnostic from callGemini() (network/HTTP
      // errors, JSON parse failures) which are technical messages by
      // nature, similar to how SCHEME_CATALOGUE.eligibility stays
      // English-only as prompt-context rather than UI chrome.
      const displayMsg = (typeof msg === "string" && msg.length > 0)
        ? msg
        : t("err_generic");

      app.innerHTML = `
        ${masthead()}
        <div class="processing-screen">

          <div class="processing-error-card" role="alert" aria-live="assertive">
            <p class="processing-error-title">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" aria-hidden="true">
                <circle cx="8" cy="8" r="7"/>
                <line x1="8" y1="5" x2="8" y2="8.5"/>
                <circle cx="8" cy="11.5" r=".6" fill="currentColor" stroke="none"/>
              </svg>
              ${esc(t("err_title"))}
            </p>

            <p class="processing-error-msg">${esc(displayMsg)}</p>

            <div class="processing-error-actions">
              <button class="btn" id="btn-err-retry">${esc(t("err_try_again"))}</button>
              <button class="btn ghost" id="btn-err-back">${esc(t("err_edit_answers"))}</button>
            </div>
          </div>

          <p style="font-size:12px;color:var(--color-text-faint);margin:0;max-width:38ch;text-align:center">
            ${esc(t("err_hint"))}
          </p>

        </div>
      `;

      document.getElementById("btn-err-retry")
        .addEventListener("click", onRetry);

      document.getElementById("btn-err-back")
        .addEventListener("click", () => {
          // Land on the last question so the user can review without restarting
          state.questionIndex = QUESTIONS.length - 1;
          navigate("questions");
        });

      wireLanguageToggle();
    }

    /**
     * showConfirm({ title, message, confirmLabel, cancelLabel, onConfirm })
     *
     * Reusable confirmation dialog for any destructive or hard-to-reverse
     * action. Appends an overlay + card to <body> (not #app, so it floats
     * above whatever screen is currently rendered and survives if that
     * screen re-renders underneath it).
     *
     * Keyboard behaviour:
     *   - Escape dismisses (treated as Cancel)
     *   - Focus starts on Cancel (the safer default for a destructive action)
     *   - Focus returns to the element that opened the dialog on close
     *
     * onConfirm: called if the user clicks the confirm button. Nothing is
     * called on cancel/dismiss — the caller's state is simply left untouched.
     */
    function showConfirm({
      title        = t("confirm_title"),
      message      = t("err_generic"),
      confirmLabel = t("err_try_again"),
      cancelLabel  = t("upload_back"),
      onConfirm,
    }) {
      const triggerEl = document.activeElement;   // to restore focus on close

      const overlay = document.createElement("div");
      overlay.className = "confirm-overlay";
      overlay.setAttribute("role", "presentation");

      overlay.innerHTML = `
        <div class="confirm-card" role="alertdialog" aria-modal="true"
             aria-labelledby="confirm-title" aria-describedby="confirm-message">
          <span class="confirm-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="none"
                 stroke="var(--color-warning)" stroke-width="2"
                 stroke-linecap="round" aria-hidden="true">
              <path d="M8 1L15 13H1L8 1z"/>
              <line x1="8" y1="6" x2="8" y2="9.5"/>
              <circle cx="8" cy="11.5" r=".6" fill="var(--color-warning)" stroke="none"/>
            </svg>
          </span>
          <h2 class="confirm-title" id="confirm-title">${esc(title)}</h2>
          <p class="confirm-message" id="confirm-message">${esc(message)}</p>
          <div class="confirm-actions">
            <button class="btn ghost" id="confirm-cancel" type="button">${esc(cancelLabel)}</button>
            <button class="btn danger" id="confirm-ok" type="button">${esc(confirmLabel)}</button>
          </div>
        </div>`;

      document.body.appendChild(overlay);

      const cancelBtn  = overlay.querySelector("#confirm-cancel");
      const confirmBtn = overlay.querySelector("#confirm-ok");

      function close() {
        overlay.removeEventListener("keydown", onKeydown);
        overlay.remove();
        // Restore focus to whatever triggered the dialog, if it still exists
        if (triggerEl && document.body.contains(triggerEl)) triggerEl.focus();
      }

      function onKeydown(e) {
        if (e.key === "Escape") { e.preventDefault(); close(); }
        // Basic focus trap: Tab cycles between the two buttons only
        if (e.key === "Tab") {
          e.preventDefault();
          (document.activeElement === cancelBtn ? confirmBtn : cancelBtn).focus();
        }
      }

      cancelBtn.addEventListener("click", close);
      confirmBtn.addEventListener("click", () => { close(); onConfirm(); });

      // Clicking the dimmed backdrop (not the card itself) also cancels
      overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

      overlay.addEventListener("keydown", onKeydown);

      // Default focus on Cancel — the safer choice for a destructive action
      cancelBtn.focus();
    }

    function renderProcessing() {

      // Sub-messages that cycle to reassure the user the process is active
      const MESSAGES = [
        t("proc_msg_1"),
        t("proc_msg_2"),
        t("proc_msg_3"),
        t("proc_msg_4"),
        t("proc_msg_5"),
        t("proc_msg_6"),
        t("proc_msg_7"),
      ];

      // Steps shown as dots: document prep → API call → parsing → done
      const STEP_LABELS = [
        t("proc_step_preparing"),
        t("proc_step_analysing"),
        t("proc_step_matching"),
        t("proc_step_done"),
      ];

      const docCount    = Object.keys(state.documents).length;
      const docCountLabel = docCount > 1 ? t("proc_docs_uploaded") : t("proc_doc_uploaded");
      const docPill     = docCount > 0
        ? `<span class="processing-doc-pill">
             <svg width="12" height="12" viewBox="0 0 16 16" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  aria-hidden="true">
               <path d="M13 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
               <line x1="5" y1="6" x2="11" y2="6"/>
               <line x1="5" y1="9" x2="9"  y2="9"/>
             </svg>
             ${docCount} ${esc(docCountLabel)}
           </span>`
        : "";

      // ── Paint the loading UI immediately ────────────────────────
      app.innerHTML = `
        ${masthead()}
        <div class="processing-screen" role="status" aria-live="polite"
             aria-label="${esc(t("proc_headline"))}">

          <!-- Orbital spinner -->
          <div class="spinner-wrap" aria-hidden="true">
            <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- track rings -->
              <circle cx="36" cy="36" r="30" stroke="var(--color-border)" stroke-width="4"/>
              <circle cx="36" cy="36" r="20" stroke="var(--color-border)" stroke-width="4"/>
              <!-- spinning arcs -->
              <g class="spinner-ring-outer">
                <circle cx="36" cy="36" r="30"
                        stroke="var(--color-primary)"
                        stroke-width="4"
                        stroke-linecap="round"
                        stroke-dasharray="47 142"
                        stroke-dashoffset="0"/>
              </g>
              <g class="spinner-ring-inner">
                <circle cx="36" cy="36" r="20"
                        stroke="var(--color-primary-deep)"
                        stroke-width="4"
                        stroke-linecap="round"
                        stroke-dasharray="25 105"
                        stroke-dashoffset="0"/>
              </g>
            </svg>
          </div>

          <!-- Headline + cycling sub-message -->
          <div>
            <h2 class="processing-headline">
              ${esc(t("proc_headline"))}
            </h2>
            <p class="processing-sub" id="proc-sub">${esc(MESSAGES[0])}</p>
          </div>

          ${docPill}

          <!-- Step dots -->
          <div class="processing-steps" aria-hidden="true">
            ${STEP_LABELS.map((_, i) =>
              `<span class="proc-step${i === 0 ? " active" : ""}"
                     data-step="${i}"
                     title="${esc(STEP_LABELS[i])}"></span>`
            ).join("")}
          </div>

          <p style="font-size:12px;color:var(--color-text-faint);margin:0">
            ${esc(t("proc_time_estimate"))}
          </p>

        </div>
      `;

      // ── Cycle sub-messages every 2.5 s ─────────────────────────
      let msgIdx    = 0;
      let stepIdx   = 0;
      const subEl   = document.getElementById("proc-sub");
      const stepEls = document.querySelectorAll(".proc-step");

      const msgTimer = setInterval(() => {
        // Fade out
        if (subEl) subEl.classList.add("is-fading");

        setTimeout(() => {
          msgIdx = (msgIdx + 1) % MESSAGES.length;
          if (subEl) {
            subEl.textContent = MESSAGES[msgIdx];
            subEl.classList.remove("is-fading");
          }
        }, 310);   // just after the .3s opacity transition
      }, 2500);

      // Advance step dots at roughly equal intervals over 12 s max
      const stepTimer = setInterval(() => {
        if (stepIdx < STEP_LABELS.length - 1) {
          stepEls[stepIdx]?.classList.replace("active", "done");
          stepIdx++;
          stepEls[stepIdx]?.classList.add("active");
        }
      }, 3000);

      wireLanguageToggle();

      // ── Call the API ────────────────────────────────────────────
      callGemini()
        .then(result => {
          // Clean up timers
          clearInterval(msgTimer);
          clearInterval(stepTimer);

          // Mark all steps done
          stepEls.forEach(el => {
            el.classList.remove("active");
            el.classList.add("done");
          });

          // Persist result and navigate to results screen
          state.results  = result;
          state.apiError = null;
          // Brief pause so the user sees the "done" state before the screen changes
          setTimeout(() => navigate("results"), 400);
        })
        .catch(err => {
          clearInterval(msgTimer);
          clearInterval(stepTimer);

          state.apiError = err.message || t("err_generic");

          // Delegate to the shared error renderer.
          // "Try Again" re-runs the entire processing flow from scratch.
          renderError(state.apiError, renderProcessing);
        });
    }

    /**
     * renderSchemeCard(scheme, animDelay = 0) → string
     *
     * Returns the HTML string for one scheme result card.
     * Called by renderResults() for every scheme in green / yellow / red groups.
     * Top-level so it can be called from any future context (e.g. a share sheet
     * or a filtered view) without needing to be inside renderResults().
     *
     * @param {object} scheme     — { name, status, reason, missingItems }
     * @param {number} animDelay  — CSS animation-delay in ms for stagger (default 0)
     */
    function renderSchemeCard(scheme, animDelay = 0) {
      const st = scheme.status;   // "green" | "yellow" | "red"

      // ── Status vocabulary ──────────────────────────────────────
      // Plain words, not bureaucratic codes. Pulled from TRANSLATIONS
      // so the status word flips with state.language.
      const STATUS_WORD = {
        green:  t("sc_eligible"),
        yellow: t("sc_possibly_eligible"),
        red:    t("sc_not_eligible"),
      };
      const statusWord = STATUS_WORD[st] || st;

      // ── Accent colour from design tokens ─────────────────────
      const accentColour = st === "green"
        ? "var(--color-success)"
        : st === "yellow"
          ? "var(--color-warning)"
          : "var(--color-border)";

      // ── Scheme name — split acronym out for visual de-emphasis ──
      // Many scheme names end in "(ACRONYM)" — move that part to a
      // lighter span so the readable name is visually dominant.
      // Example: "PM Mudra Yojana (PMMY)" →
      //   <span>PM Mudra Yojana</span><span class="sc-acronym"> (PMMY)</span>
      //
      // Scheme names themselves are NOT translated — they're proper nouns
      // (official scheme titles) that Indian citizens encounter in English
      // on every government portal and form, so keeping them in English
      // in both locales is the more useful/recognisable choice. Only the
      // surrounding chrome (status, benefit, ministry, reason) translates.
      const nameMatch  = scheme.name.match(/^(.*?)(\s*\([^)]+\))\s*$/);
      const nameHTML   = nameMatch
        ? `${esc(nameMatch[1])}<span class="sc-acronym">${esc(nameMatch[2])}</span>`
        : esc(scheme.name);

      // ── Benefit / ministry text from catalogue, language-aware ───
      const catalogEntry = SCHEME_CATALOGUE.find(c => c.name === scheme.name);
      const benefit       = schemeBenefit(catalogEntry);
      const ministry      = schemeMinistry(catalogEntry);

      // ── Portal link from meta ─────────────────────────────────
      // Portal URLs/domains are not translated (they're literal addresses),
      // but the surrounding "Apply on" label is.
      const meta    = CATALOGUE_META[scheme.name] || {};
      const applyHTML = meta.portal
        ? `<a class="sc-apply"
              href="${esc(meta.portal)}"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="${esc(t("sc_apply_on"))} ${esc(scheme.name)} — ${esc(meta.short || meta.portal)}">
             ${esc(t("sc_apply_on"))} ${esc(meta.short || meta.portal)}
             <svg width="11" height="11" viewBox="0 0 12 12" fill="none"
                  stroke="currentColor" stroke-width="1.9"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
               <path d="M5 1h6v6M11 1 4 8"/>
               <path d="M3 3H1v8h8V9"/>
             </svg>
           </a>`
        : `<span></span>`;   // keeps footer flex layout balanced

      // ── Ministry as a collapsible <details> ───────────────────
      const ministryHTML = ministry
        ? `<details class="sc-ministry">
             <summary class="sc-ministry-toggle">${esc(t("sc_ministry"))} ▾</summary>
             <p class="sc-ministry-body">${esc(ministry)}</p>
           </details>`
        : "";

      // ── Checklist of missing items (yellow cards only) ───────────
      //
      // toActionText(phrase) converts a noun-phrase from Gemini into an
      // imperative action the user can tick off as they complete it.
      //
      // IMPORTANT: when state.language === 'hi', Gemini is instructed
      // (see buildGeminiPrompt) to return missingItems text IN HINDI.
      // The English keyword matching below ("certificate", "card", etc.)
      // cannot match Hindi text, so this function branches by language:
      // Hindi phrases get a Hindi prefix without attempting keyword
      // classification (Hindi missingItems phrases from Gemini are
      // already written as clear noun phrases; a single consistent
      // prefix reads naturally rather than guessing a category).
      function toActionText(phrase) {
        const p = phrase.trim();

        if (state.language === "hi") {
          // If Gemini already returned an imperative-style Hindi phrase
          // (starts with a common Hindi action verb), pass through as-is.
          const HI_ACTION_STARTS = ["जमा", "प्राप्त", "आवेदन", "पंजीकरण", "प्रदान", "अपलोड", "पुष्टि", "जांच", "दिखाएं", "संलग्न"];
          if (HI_ACTION_STARTS.some(v => p.startsWith(v))) return p;
          return `${t("sc_action_get_your")} ${p}`;
        }

        const low = p.toLowerCase();

        const ACTION_VERBS = [
          "submit", "get", "apply", "register", "provide", "upload",
          "confirm", "check", "obtain", "show", "attach", "visit",
        ];
        if (ACTION_VERBS.some(v => low.startsWith(v))) {
          // Already imperative — just capitalise first letter
          return p.charAt(0).toUpperCase() + p.slice(1);
        }

        const DOC_WORDS = [
          "certificate", "card", "proof", "letter", "passbook", "book",
          "copy", "form", "id", "document", "ration", "voter", "pan",
          "aadhaar", "aadhar", "licence", "license", "permit",
        ];
        if (DOC_WORDS.some(w => low.includes(w))) {
          return `${t("sc_action_get_your")} ${p.charAt(0).toLowerCase()}${p.slice(1)}`;
        }

        const CRITERION_WORDS = [
          "age", "below", "above", "income", "enrolled", "registered",
          "bpl", "listed", "survey", "secc", "limit", "threshold",
        ];
        if (CRITERION_WORDS.some(w => low.includes(w))) {
          return `${t("sc_action_confirm")} ${p}`;
        }

        return `${t("sc_action_provide")} ${p}`;
      }

      const items      = (st === "yellow" && Array.isArray(scheme.missingItems))
        ? scheme.missingItems.filter(Boolean)
        : [];
      const checklistId = `cl-${scheme.name.replace(/\W+/g, "-").toLowerCase()}`;
      const itemCountLabel = items.length === 1 ? t("sc_item") : t("sc_items");

      const missingHTML = items.length
        ? `<div class="sc-missing">
             <div class="sc-checklist-head">
               <span class="sc-checklist-label">${esc(t("sc_to_do_before_applying"))}</span>
               <span class="sc-checklist-count">(${items.length} ${esc(itemCountLabel)})</span>
             </div>
             <ul class="sc-checklist"
                 id="${esc(checklistId)}"
                 role="list"
                 aria-label="${esc(t("sc_to_do_before_applying"))} — ${esc(scheme.name)}">
               ${items.map((item, i) => {
                 const action = toActionText(item);
                 const rowId  = `${esc(checklistId)}-${i}`;
                 return `
                   <li class="sc-checklist-item"
                       role="listitem"
                       data-idx="${i}"
                       data-list="${esc(checklistId)}"
                       tabindex="0"
                       aria-checked="false"
                       aria-label="${esc(action)}">
                     <span class="sc-check-box" aria-hidden="true">
                       <svg class="sc-check-tick" width="10" height="10"
                            viewBox="0 0 10 10" fill="none"
                            stroke="white" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                         <polyline points="1.5,5 4,7.5 8.5,2"/>
                       </svg>
                     </span>
                     <span class="sc-check-text" id="${rowId}">${esc(action)}</span>
                   </li>`;
               }).join("")}
             </ul>
           </div>`
        : "";

      return `
        <article class="scheme-card"
                 style="border-left-color:${accentColour};animation-delay:${animDelay}ms"
                 aria-label="${esc(scheme.name)}, ${esc(statusWord)}">

          <!-- Badge row: dot · status word · scheme name -->
          <div class="sc-badge-row">
            <span class="sc-dot ${st}" aria-hidden="true"></span>
            <span class="sc-status-word ${st}">${esc(statusWord)}</span>
            <span class="sc-sep" aria-hidden="true">·</span>
            <span class="sc-name">${nameHTML}</span>
          </div>

          <!-- Benefit — what you actually get, upfront -->
          ${benefit ? `<p class="sc-benefit">${esc(benefit)}</p>` : ""}

          <!-- Reason — Gemini's explanation (returned in state.language,
               see buildGeminiPrompt's language instruction).
               Red cards get a prominent labeled block since the reason is
               the only substantive content (no benefit strip, no checklist)
               and the user needs to clearly understand WHY, not just that
               they don't qualify. Green/yellow keep the plain paragraph. -->
          ${st === "red"
            ? `<div class="sc-reason-block">
                 <span class="sc-reason-label">${esc(t("sc_why_not_qualify"))}</span>
                 <p class="sc-reason-text">${esc(scheme.reason)}</p>
               </div>`
            : `<p class="sc-reason">${esc(scheme.reason)}</p>`}

          <!-- Missing items — only on yellow -->
          ${missingHTML}

          <!-- Footer: apply link + ministry toggle -->
          <div class="sc-footer">
            ${applyHTML}
            ${ministryHTML}
          </div>

        </article>`;
    }

    /**
     * wireChecklists()
     *
     * Attaches click and keyboard handlers to every .sc-checklist-item
     * currently in the DOM. Called once after renderResults() writes its
     * HTML. Toggle .is-checked on the row and flip aria-checked so screen
     * readers announce the state change.
     *
     * State is in-memory only — refreshing the page resets all ticks, which
     * is correct: the checklist is a disposable working scratch pad, not a
     * persistent to-do list.
     */
    function wireChecklists() {
      document.querySelectorAll(".sc-checklist-item").forEach(row => {
        function toggle() {
          const checked = row.classList.toggle("is-checked");
          row.setAttribute("aria-checked", String(checked));
        }

        row.addEventListener("click", toggle);

        // Keyboard: Space or Enter toggles, matching native checkbox behaviour
        row.addEventListener("keydown", e => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();   // prevent page scroll on Space
            toggle();
          }
        });
      });
    }

    // ── PDF export ───────────────────────────────────────────────
    //
    // "Download as PDF" on the results screen. Uses jsPDF (loaded via
    // CDN <script> tag in <head>) with its native vector text API —
    // NOT the doc.html()/html2canvas route, which would add a second
    // CDN dependency, produce a rasterised (non-selectable) PDF, and
    // still hit the same Devanagari shaping limitations described below
    // while being slower and more fragile in a single-file, no-build app.
    //
    // KNOWN LIMITATION: jsPDF's text layout engine places glyphs left to
    // right without applying OpenType GSUB/GPOS shaping rules. Devanagari
    // relies on those rules for conjunct consonants and reordered matras
    // (e.g. "‍र" + vowel signs). The embedded font below renders correct,
    // legible, correctly-ordered Devanagari characters, but complex
    // conjuncts may appear visually simplified compared to how the same
    // text renders in a browser. This is a constraint of jsPDF's renderer,
    // not the font — there is no current open-source jsPDF text-shaping
    // engine that fully solves this. The PDF remains readable and is
    // sufficient for the stated goal (a plain printable summary), but it
    // is not pixel-perfect with on-screen Hindi rendering.

    // Static-weight TTF (NOT a variable font — jsPDF's addFont needs a
    // plain TTF/OTF, and variable-font bracket-axis URLs like
    // "Font[wdth,wght].ttf" don't resolve as static files). This exact
    // path is confirmed in active use by Noto's own official test suite
    // (notofonts/noto-source repo) for live browser @font-face rendering,
    // and jsDelivr's /gh/ proxy permanently caches a file once first
    // fetched — so it stays available even if the upstream repo changes.
    const PDF_FONT_TTF_URL = "https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts@main/phaseIII_only/unhinted/ttf/NotoSansDevanagari/NotoSansDevanagari-Regular.ttf";

    let _pdfHindiFontCache = null;   // base64 string, cached after first successful fetch

    /**
     * loadHindiFontBase64() → Promise<string>
     *
     * Fetches the Noto Sans Devanagari TTF from CDN and returns it as a
     * base64 string ready for jsPDF's addFileToVFS(). Cached in-memory
     * after the first successful load so repeat PDF downloads in the same
     * session don't re-fetch ~500KB over the network each time.
     *
     * Throws if the fetch fails (offline, CDN blocked, etc.) — the caller
     * is responsible for catching this and showing pdf_font_load_error.
     */
    async function loadHindiFontBase64() {
      if (_pdfHindiFontCache) return _pdfHindiFontCache;

      const response = await fetch(PDF_FONT_TTF_URL);
      if (!response.ok) throw new Error(`Font fetch failed: HTTP ${response.status}`);

      const buffer = await response.arrayBuffer();
      const bytes  = new Uint8Array(buffer);

      // Convert to base64 in chunks to avoid call-stack limits on
      // String.fromCharCode(...bytes) for large files
      let binary = "";
      const CHUNK = 8192;
      for (let i = 0; i < bytes.length; i += CHUNK) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
      }
      _pdfHindiFontCache = btoa(binary);
      return _pdfHindiFontCache;
    }

    /**
     * buildResultsPDF() → Promise<void>
     *
     * Generates and triggers a download of a printable PDF summary of
     * state.results, formatted simply (headings + bullet lists) since
     * the goal is something a person can print and carry to a government
     * office — not a polished brochure.
     *
     * Content mirrors the results screen exactly: same t() keys, same
     * schemeBenefit/schemeMinistry language-aware helpers, so the PDF
     * can never drift out of sync with what's on screen. Reflects
     * whichever language is currently selected (state.language) for
     * every label AND for the scheme reason/missingItems text already
     * stored in state.results (which came back from Gemini in that
     * language per buildLanguageInstruction()).
     */
    async function buildResultsPDF() {
      if (!state.results) return;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "a4" });

      // ── Register Hindi font if needed ───────────────────────────
      const isHindi = state.language === "hi";
      let bodyFont = "helvetica";   // jsPDF's built-in default

      if (isHindi) {
        const fontBase64 = await loadHindiFontBase64();   // may throw — caller catches
        doc.addFileToVFS("NotoSansDevanagari.ttf", fontBase64);
        doc.addFont("NotoSansDevanagari.ttf", "NotoSansDevanagari", "normal");
        doc.addFont("NotoSansDevanagari.ttf", "NotoSansDevanagari", "bold");   // single weight covers both — no separate bold file fetched
        bodyFont = "NotoSansDevanagari";
      }
      doc.setFont(bodyFont, "normal");

      // ── Layout constants ─────────────────────────────────────────
      const PAGE_W      = doc.internal.pageSize.getWidth();
      const PAGE_H       = doc.internal.pageSize.getHeight();
      const MARGIN       = 48;
      const CONTENT_W    = PAGE_W - MARGIN * 2;
      const LINE_H       = 14;
      let   y             = MARGIN;
      let   pageNum       = 1;

      // Colours as RGB triples matching the on-screen design tokens
      const COLOR_TEXT    = [21, 35, 59];     // --color-text
      const COLOR_MUTED   = [69, 84, 110];    // --color-text-muted
      const COLOR_FAINT   = [122, 135, 156];  // --color-text-faint
      const COLOR_GREEN   = [30, 122, 82];    // --color-success
      const COLOR_YELLOW  = [153, 104, 15];   // --color-warning
      const COLOR_RED     = [180, 39, 26];    // --color-danger (used sparingly, red SECTION itself stays neutral on-screen but a small red rule reads well in print)
      const COLOR_RULE    = [215, 223, 234];  // --color-border

      // ── Footer (page number) — drawn at the end on every page ────
      function drawFooter() {
        doc.setFont(bodyFont, "normal");
        doc.setFontSize(8.5);
        doc.setTextColor(...COLOR_FAINT);
        const label = `${t("pdf_page_label")} ${pageNum}`;
        doc.text(label, PAGE_W / 2, PAGE_H - 24, { align: "center" });
      }

      // ── Page-break helper ──────────────────────────────────────
      // Call before writing any block; adds a new page if the block
      // (estimated height) won't fit in the remaining space.
      function ensureSpace(neededHeight) {
        if (y + neededHeight > PAGE_H - MARGIN - 20) {
          drawFooter();
          doc.addPage();
          pageNum++;
          y = MARGIN;
        }
      }

      // ── Text helpers ─────────────────────────────────────────────
      function heading(text, size, color, weight = "bold") {
        ensureSpace(size + 10);
        doc.setFont(bodyFont, isHindi ? "normal" : weight);   // single embedded weight for Hindi — fake-bold via size bump instead
        doc.setFontSize(isHindi && weight === "bold" ? size + 1 : size);
        doc.setTextColor(...color);
        doc.text(text, MARGIN, y);
        y += size + 8;
      }

      function paragraph(text, size, color, indent = 0) {
        doc.setFont(bodyFont, "normal");
        doc.setFontSize(size);
        doc.setTextColor(...color);
        const lines = doc.splitTextToSize(text, CONTENT_W - indent);
        lines.forEach(line => {
          ensureSpace(LINE_H);
          doc.text(line, MARGIN + indent, y);
          y += LINE_H;
        });
      }

      function bullet(text, size, color, indent = 14) {
        doc.setFont(bodyFont, "normal");
        doc.setFontSize(size);
        doc.setTextColor(...color);
        const lines = doc.splitTextToSize(text, CONTENT_W - indent - 10);
        lines.forEach((line, i) => {
          ensureSpace(LINE_H);
          if (i === 0) doc.text("•", MARGIN + indent - 10, y);
          doc.text(line, MARGIN + indent, y);
          y += LINE_H;
        });
      }

      function ruleLine() {
        ensureSpace(10);
        doc.setDrawColor(...COLOR_RULE);
        doc.setLineWidth(0.75);
        doc.line(MARGIN, y, PAGE_W - MARGIN, y);
        y += 14;
      }

      // ── Header: app name + date ─────────────────────────────────
      heading(t("brand_name"), 18, COLOR_TEXT, "bold");
      doc.setFont(bodyFont, "normal");
      doc.setFontSize(10);
      doc.setTextColor(...COLOR_FAINT);
      doc.text(t("pdf_subtitle"), MARGIN, y);
      y += 18;

      const dateStr = new Date().toLocaleDateString(
        isHindi ? "hi-IN" : "en-IN",
        { year: "numeric", month: "long", day: "numeric" }
      );
      paragraph(`${t("pdf_date_label")}: ${dateStr}`, 10, COLOR_MUTED);
      y += 6;
      ruleLine();

      // ── Title ────────────────────────────────────────────────────
      heading(t("pdf_title"), 15, COLOR_TEXT, "bold");
      y += 4;

      // ── Group schemes by status (same grouping as the screen) ────
      const { schemes } = state.results;
      const groups = [
        { status: "green",  items: schemes.filter(s => s.status === "green"),  heading: t("pdf_green_heading"),  color: COLOR_GREEN  },
        { status: "yellow", items: schemes.filter(s => s.status === "yellow"), heading: t("pdf_yellow_heading"), color: COLOR_YELLOW },
        { status: "red",    items: schemes.filter(s => s.status === "red"),    heading: t("pdf_red_heading"),    color: COLOR_RED    },
      ];

      groups.forEach(group => {
        if (group.items.length === 0) return;   // omit empty sections, same as the screen

        ensureSpace(40);
        y += 6;
        heading(`${group.heading}  (${group.items.length})`, 12.5, group.color, "bold");

        group.items.forEach(scheme => {
          ensureSpace(LINE_H * 2);

          // Scheme name — bold, English (matches on-screen behaviour:
          // scheme names are intentionally not translated, see
          // renderSchemeCard's comment on the same decision)
          doc.setFont(bodyFont, isHindi ? "normal" : "bold");
          doc.setFontSize(11);
          doc.setTextColor(...COLOR_TEXT);
          const nameLines = doc.splitTextToSize(scheme.name, CONTENT_W - 10);
          nameLines.forEach(line => { ensureSpace(LINE_H); doc.text(line, MARGIN + 4, y); y += LINE_H; });

          // Reason — already in state.language from Gemini's response
          paragraph(`${t("pdf_reason_label")} ${scheme.reason}`, 9.5, COLOR_MUTED, 10);

          // Missing items (yellow only)
          if (group.status === "yellow" && Array.isArray(scheme.missingItems) && scheme.missingItems.length > 0) {
            doc.setFont(bodyFont, "normal");
            doc.setFontSize(9);
            doc.setTextColor(...COLOR_YELLOW);
            ensureSpace(LINE_H);
            doc.text(t("pdf_missing_label"), MARGIN + 10, y);
            y += LINE_H;
            scheme.missingItems.forEach(item => bullet(item, 9, COLOR_MUTED, 18));
          }

          y += 8;   // gap between scheme entries
        });

        y += 4;
      });

      // ── Disclaimer ───────────────────────────────────────────────
      y += 6;
      ruleLine();
      paragraph(t("pdf_disclaimer"), 8.5, COLOR_FAINT);

      drawFooter();   // final page's footer

      // ── Save ─────────────────────────────────────────────────────
      const fileDate = new Date().toISOString().slice(0, 10);   // YYYY-MM-DD
      doc.save(`scheme-setu-results-${fileDate}.pdf`);
    }

    function renderResults() {
      // Guard: state.results must be populated by callGemini() before this
      // screen renders. If it's null (direct navigation, stale state, or a
      // bug), show the error screen rather than crashing or rendering nothing.
      if (!state.results) {
        renderError(
          state.apiError || t("err_no_results"),
          renderProcessing   // "Try Again" re-runs the API call
        );
        return;
      }

      const { schemes, documentChecks } = state.results;

      // ── Group schemes by status ──────────────────────────────────
      const green  = schemes.filter(s => s.status === "green");
      const yellow = schemes.filter(s => s.status === "yellow");
      const red    = schemes.filter(s => s.status === "red");

      // ── Helper: render a full section ────────────────────────────
      function section(status, items, title, subtitle) {
        if (!items.length) return "";   // omit empty sections entirely

        const borderColour = status === "green"
          ? "var(--color-success)"
          : status === "yellow"
            ? "var(--color-warning)"
            : "var(--color-border)";

        // Icon SVG per status
        const iconSVG = {
          green: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                       stroke="var(--color-success)" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="7"/>
                    <polyline points="5,8 7,10.5 11,5.5"/>
                  </svg>`,
          yellow:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                       stroke="var(--color-warning)" stroke-width="2"
                       stroke-linecap="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="7"/>
                    <line x1="8" y1="5" x2="8" y2="8.5"/>
                    <circle cx="8" cy="11.5" r=".6" fill="var(--color-warning)" stroke="none"/>
                  </svg>`,
          red:   `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                       stroke="var(--color-text-faint)" stroke-width="2"
                       stroke-linecap="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="7"/>
                    <line x1="5.5" y1="5.5" x2="10.5" y2="10.5"/>
                    <line x1="10.5" y1="5.5" x2="5.5" y2="10.5"/>
                  </svg>`,
        }[status];

        const cardsHTML = items.map((s, i) => {
          const delay = i * 55;
          return renderSchemeCard(s, delay);
        }).join("");

        return `
          <section class="result-section" aria-labelledby="section-${status}">
            <div class="section-header" style="border-color:${borderColour}">
              <span class="section-icon ${status}" aria-hidden="true">${iconSVG}</span>
              <div class="section-title-wrap">
                <h3 class="section-title ${status}" id="section-${status}">${esc(title)}</h3>
                <p class="section-subtitle">${esc(subtitle)}</p>
              </div>
              <span class="section-count" aria-label="${items.length}">
                ${items.length}
              </span>
            </div>
            ${cardsHTML}
          </section>`;
      }

      // ── Document warning panel ────────────────────────────────────
      const flaggedDocs = (documentChecks || []).filter(d => !d.legible || !d.authentic);
      const docWarningsHTML = flaggedDocs.length
        ? `<div class="doc-warnings" role="note" aria-label="${esc(t("results_doc_issues"))}">
             <div class="doc-warnings-head">
               <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
                    stroke="var(--color-warning)" stroke-width="2"
                    stroke-linecap="round" aria-hidden="true">
                 <path d="M8 1L15 13H1L8 1z"/>
                 <line x1="8" y1="6" x2="8" y2="9.5"/>
                 <circle cx="8" cy="11.5" r=".6" fill="var(--color-warning)" stroke="none"/>
               </svg>
               <h3>${esc(t("results_doc_issues"))}</h3>
             </div>
             ${flaggedDocs.map(d => `
               <div class="doc-warn-row">
                 <span class="doc-warn-label">${esc(d.label || d.docId)}:</span>
                 <span>${esc(d.note || (!d.legible ? t("results_unreadable") : t("results_unverified")))}</span>
               </div>`).join("")}
           </div>`
        : "";

      // ── Summary tally chips ───────────────────────────────────────
      const tallyHTML = `
        <div class="results-tally" aria-label="${esc(t("results_summary"))}">
          ${green.length  ? `<span class="tally-chip green">✓ ${green.length} ${esc(t("results_tally_eligible"))}</span>`  : ""}
          ${yellow.length ? `<span class="tally-chip yellow">● ${yellow.length} ${esc(t("results_tally_possible"))}</span>` : ""}
          ${red.length    ? `<span class="tally-chip red">✕ ${red.length} ${esc(t("results_tally_not_eligible"))}</span>`  : ""}
        </div>`;

      // ── Final render ──────────────────────────────────────────────
      app.innerHTML = `
        ${masthead()}
        <div class="results-screen">

          <!-- Summary bar -->
          <div class="results-summary">
            <span class="results-summary-label">
              ${esc(t("results_summary"))} · ${schemes.length} ${esc(t("results_schemes_checked"))}
            </span>
            ${tallyHTML}
          </div>

          ${docWarningsHTML}

          <!-- Green section -->
          ${section("green",  green,
              t("results_green_title"),
              t("results_green_sub"))}

          <!-- Yellow section -->
          ${section("yellow", yellow,
              t("results_yellow_title"),
              t("results_yellow_sub"))}

          <!-- Red section -->
          ${section("red",    red,
              t("results_red_title"),
              t("results_red_sub"))}

          <!-- Actions -->
          <div class="results-actions">
            <button class="btn ghost" id="btn-res-back">${esc(t("results_edit_answers"))}</button>
            <button class="btn ghost btn-pdf" id="btn-res-pdf">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"
                   stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 1v9M4.5 6.5 8 10l3.5-3.5"/>
                <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2"/>
              </svg>
              <span id="btn-res-pdf-label">${esc(t("pdf_download"))}</span>
            </button>
            <button class="btn" id="btn-res-restart">${esc(t("results_start_new"))}</button>
            <p class="pdf-error-msg" id="pdf-error-msg" role="alert"></p>
          </div>

          <!-- Disclaimer -->
          <p class="results-disclaimer">
            ${esc(t("results_disclaimer"))}
            <a href="https://www.india.gov.in/topics/common-service-centres"
               target="_blank" rel="noopener noreferrer">${esc(t("results_csc"))}</a>
            ${esc(t("results_before_applying"))}
            <a href="https://www.myscheme.gov.in" target="_blank" rel="noopener noreferrer">
              myscheme.gov.in</a>.
          </p>

        </div>
      `;

      // ── Event wiring ─────────────────────────────────────────────
      document.getElementById("btn-res-back").addEventListener("click", () => {
        state.questionIndex = QUESTIONS.length - 1;
        navigate("questions");
      });

      document.getElementById("btn-res-pdf").addEventListener("click", async () => {
        const btn      = document.getElementById("btn-res-pdf");
        const label    = document.getElementById("btn-res-pdf-label");
        const errorEl  = document.getElementById("pdf-error-msg");
        const origText = label.textContent;

        // Loading state: disable button, swap label, show spinner
        btn.disabled = true;
        errorEl.classList.remove("is-visible");
        label.textContent = t("pdf_preparing");
        const spinner = document.createElement("span");
        spinner.className = "btn-pdf-spinner";
        spinner.setAttribute("aria-hidden", "true");
        btn.insertBefore(spinner, btn.firstChild);

        try {
          await buildResultsPDF();
        } catch (err) {
          console.error("[PDF] generation failed:", err);
          errorEl.textContent = t("pdf_font_load_error");
          errorEl.classList.add("is-visible");
        } finally {
          btn.disabled = false;
          label.textContent = origText;
          spinner.remove();
        }
      });

      document.getElementById("btn-res-restart").addEventListener("click", () => {
        showConfirm({
          title:        t("confirm_title"),
          message:      t("confirm_message"),
          confirmLabel: t("confirm_clear"),
          cancelLabel:  t("confirm_keep"),
          onConfirm() {
            Object.values(state.previews).forEach(url => { if (url) URL.revokeObjectURL(url); });
            state.questionIndex = 0;
            state.documents     = {};
            state.documentMeta  = {};
            state.previews      = {};
            state.answers       = {};
            state.results       = null;
            state.apiError      = null;
            clearPersistedState();
            navigate("landing");
          },
        });
      });

      // Wire interactive checklist items for yellow-status cards
      wireChecklists();
    }


    /**
     * renderResumePrompt(snapshot)
     *
     * Shown at boot, before the normal app UI, when a previous partial
     * session was found in localStorage. Gives the user an explicit choice
     * rather than silently restoring — resuming without asking can be
     * disorienting if the user intentionally closed the tab to start over.
     *
     * "Resume" copies the saved fields into `state` and proceeds into the
     * normal router at the saved screen. "Start fresh" discards the saved
     * session and boots normally on the landing screen.
     */
    function renderResumePrompt(snapshot) {
      // Build a short, human-readable summary of what was saved so the
      // choice is informed, not a blind "are you sure?"
      const parts = [];

      const answeredCount = snapshot.answers ? Object.keys(snapshot.answers).length : 0;
      if (answeredCount > 0) {
        parts.push(`${answeredCount} ${t("q_of")} ${QUESTIONS.length} ${t("resume_questions_answered")}`);
      }

      const docCount = snapshot.documentMeta ? Object.keys(snapshot.documentMeta).length : 0;
      if (docCount > 0) {
        const docLabelText = docCount !== 1 ? t("resume_docs_uploaded") : t("resume_doc_uploaded");
        parts.push(`${docCount} ${docLabelText}`);
      }

      if (snapshot.results) {
        parts.push(t("resume_results_ready"));
      }

      const SCREEN_LABEL = {
        upload:    t("resume_screen_upload"),
        questions: t("resume_screen_questions"),
        results:   t("resume_screen_results"),
      };
      const screenLabel = SCREEN_LABEL[snapshot.currentScreen] || t("resume_screen_fallback");

      const summaryText = parts.length > 0
        ? parts.join(" · ")
        : `${t("resume_last_seen")}: ${screenLabel}`;

      // Relative "how long ago" for the savedAt timestamp
      const savedAgo = (() => {
        if (!snapshot.savedAt) return "";
        const mins = Math.round((Date.now() - snapshot.savedAt) / 60000);
        if (mins < 1)  return t("resume_just_now");
        if (mins < 60) return `${mins} ${mins !== 1 ? (state.language === "hi" ? "मिनट" : "minutes") : (state.language === "hi" ? "मिनट" : "minute")} ${state.language === "hi" ? "पहले" : "ago"}`;
        const hours = Math.round(mins / 60);
        if (hours < 24) return `${hours} ${hours !== 1 ? (state.language === "hi" ? "घंटे" : "hours") : (state.language === "hi" ? "घंटा" : "hour")} ${state.language === "hi" ? "पहले" : "ago"}`;
        const days = Math.round(hours / 24);
        return `${days} ${days !== 1 ? (state.language === "hi" ? "दिन" : "days") : (state.language === "hi" ? "दिन" : "day")} ${state.language === "hi" ? "पहले" : "ago"}`;
      })();

      app.innerHTML = `
        ${masthead()}
        <div class="processing-screen">

          <div class="processing-error-card" role="alert" style="border-color:var(--color-border)">
            <p class="processing-error-title" style="color:var(--color-text)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                   stroke="var(--color-primary)" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 1v7l4 2"/>
                <circle cx="8" cy="8" r="7"/>
              </svg>
              ${esc(t("resume_title"))}
            </p>

            <p class="processing-error-msg">
              ${esc(summaryText)}${savedAgo ? ` — ${esc(t("resume_saved"))} ${esc(savedAgo)}` : ""}.
              ${docCount > 0 ? esc(t("resume_reattach_docs")) : ""}
            </p>

            <div class="processing-error-actions">
              <button class="btn" id="btn-resume">${esc(t("resume_button"))}</button>
              <button class="btn ghost" id="btn-start-fresh">${esc(t("resume_start_fresh"))}</button>
            </div>
          </div>

        </div>
      `;

      document.getElementById("btn-resume").addEventListener("click", () => {
        // Copy saved fields into state. Documents/previews are intentionally
        // NOT restored — File objects can't survive localStorage, and the
        // user will see their document slots as "empty" again on the
        // upload screen even though documentMeta remembers what was there.
        // (state.language was already restored unconditionally at boot.)
        state.currentScreen = snapshot.currentScreen || "landing";
        state.questionIndex = snapshot.questionIndex || 0;
        state.documentMeta  = snapshot.documentMeta  || {};
        state.answers       = snapshot.answers       || {};
        state.results       = snapshot.results       || null;
        render();
      });

      document.getElementById("btn-start-fresh").addEventListener("click", () => {
        clearPersistedState();
        state.currentScreen = "landing";
        render();
      });

      wireLanguageToggle();
    }


    // ── Boot ──────────────────────────────────────────────────────
    //
    // Before the normal first render, check localStorage for a resumable
    // session. If one exists, show the resume prompt instead of jumping
    // straight to the landing screen — the user decides whether to pick
    // up where they left off or start clean.
    //
    // Language is restored unconditionally here, before that choice is
    // even shown — it's a display preference, not session progress, so
    // it should apply whether the user resumes or starts fresh.

    (function boot() {
      const snapshot = loadPersistedState();
      if (snapshot?.language === "en" || snapshot?.language === "hi") {
        state.language = snapshot.language;
      }
      if (hasResumableContent(snapshot)) {
        renderResumePrompt(snapshot);
      } else {
        render();
      }
    })();
  </script>
</body>
</html>
